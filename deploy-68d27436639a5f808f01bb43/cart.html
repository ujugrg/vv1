<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | ValueVibe</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background: #131313;
      min-height: 100vh;
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .cart-container {
      max-width: 420px;
      width: 100%;
      height: 100vh;
      margin: 0 auto;
      background: rgba(24, 24, 36, 0);
      border-radius: 1.5rem;
      box-shadow: 0 8px 32px 0 rgba(162, 89, 255, 0.18), 0 2px 16px 0 rgba(0,0,0,0.12);
      padding: 2rem 1.2rem 1.2rem 1.2rem;
      color: var(--text-light, #fff);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
      animation: cartFadeIn 0.7s cubic-bezier(.4,0,.2,1);
      box-sizing: border-box;
    }
    @keyframes cartFadeIn {
      from { opacity: 0; transform: translateY(30px) scale(0.98); }
      to { opacity: 1; transform: none; }
    }
    .cart-title {
      color: var(--primary, #a259ff);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
      text-align: center;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px #0002;
    }
    .cart-items-list {
      margin-bottom: 1.5rem;
      flex: 1;
      overflow-y: auto;
      min-height: 80px;
    }
    .cart-item {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 1rem;
      background: rgba(34,34,44,0.98);
      border-radius: 1rem;
      padding: 1rem 1rem 1rem 0.7rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 8px rgba(162,89,255,0.10);
      position: relative;
      transition: box-shadow 0.2s, transform 0.2s;
      min-height: 90px;
    }
    .cart-item:hover {
      box-shadow: 0 4px 16px 0 rgba(162, 89, 255, 0.18);
      transform: translateY(-2px) scale(1.01);
    }
    .cart-item-img {
      width: 110px;
      height: 100px;
      object-fit: cover;
      border-radius: 0.7rem;
      background: #fff;
      box-shadow: 0 2px 8px #0001;
      border: 1.5px solid #a259ff33;
      flex-shrink: 0;
      display: block;
    }
    .cart-item-details {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-end;
      text-align: right;
    }
    .cart-item-title,
    .cart-item-price {
      text-align: right;
    }
    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.2rem;
      flex-wrap: wrap;
      justify-content: flex-end;   /* Move controls to the right */
      padding-right: 0.5rem;       /* Optional: add a little space from the edge */
    }
    .cart-item-qty input {
      width: 38px;
      text-align: center;
      border-radius: 0.5rem;
      border: 1px solid #ccc;
      padding: 0.2rem 0.3rem;
      font-size: 1rem;
      background: #23233a;
      color: #fff;
    }
    .cart-item-qty button {
      background: var(--primary, #a259ff);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 2rem;
      height: 2rem;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cart-item-qty button:hover {
      background: var(--secondary, #f24e1e);
      transform: scale(1.08);
    }
    .cart-item-remove {
      background: var(--secondary, #f24e1e);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 2.2rem;
      height: 2.2rem;
      font-weight: 700;
      cursor: pointer;
      margin-left: 0.7rem;
      transition: background 0.2s, transform 0.15s;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px #a259ff22;
    }
    .cart-item-remove:hover {
      background: #a259ff;
      transform: scale(1.08);
    }
    .cart-total {
      text-align: right;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary, #a259ff);
      margin-bottom: 1.2rem;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px #0002;
    }
    .cart-actions {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 0.5rem;
    }
    .buy-btn {
      background: linear-gradient(90deg, #000000, #515151, #000000);
      color: #fff;
      border: none;
      border-radius: 1rem;
      padding: 0.7rem 1.5rem;
      font-weight: 700;
      font-size: 1.05rem;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(162, 89, 255, 0.18);
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.5px;
    }
    .buy-btn:hover {
      background: linear-gradient(90deg, #f24e1e, #a259ff, #f24e1e);
      transform: scale(1.04);
    }
    .empty-cart {
      text-align: center;
      color: var(--text-muted, #b0b0c3);
      font-size: 1.1rem;
      margin: 2rem 0;
    }
    /* Mobile Responsive */
    @media (max-width: 600px) {
      body {
        align-items: flex-start;
        justify-content: flex-start;
        height: 100vh;
      }
      .cart-container {
        max-width: 100vw;
        width: 100vw;
        height: 100vh;
        padding: 1rem 1rem 5.5rem 1rem;
        border-radius: 0;
        min-height: 100vh;
      }
      .cart-title {
        font-size: 2rem;
      }
      .cart-item {
        padding: 0.6rem 0.4rem;
        gap: 0.5rem;
        min-height: 70px;
      }
      .cart-item-img {
        width: 150px;
        height: 100px;
      }
      .cart-item-title {
        font-size: 1.5rem;
      }
      .cart-item-price {
        font-size: 1.5rem;
        margin-bottom: 1rem;
      }
      .cart-item-qty button {
        width: 1.5rem;
        height: 1.5rem;
        font-size: 0.95rem;
      }
      .cart-item-qty input {
        width: 28px;
        font-size: 0.92rem;
      }
      .cart-item-remove {
        font-size: 1.1rem;
        width: 1.7rem;
        height: 1.7rem;
        padding: 0;
      }
      .cart-total {
        font-size: 1rem;
      }
      .cart-actions button {
        padding: 0.5rem 1rem;
        font-size: 0.95rem;
      }
      .cart-item-qty {
        justify-content: flex-end;
        padding-right: 0.3rem;
      }
      .cart-item-details {
        align-items: flex-end;
        text-align: right;
      }
    }
    body.light-theme .back-btn {
      background: #fff !important;
      color: #3b82f6 !important;
      border: 1.5px solid #e0e7ef !important;
      box-shadow: 0 2px 8px #e0e7ef !important;
      font-weight: 600;
    }
    body.light-theme .back-btn:hover {
      background: #e0f2fe !important;
      color: #2563eb !important;
      border-color: #3b82f6 !important;
    }
    body.light-theme .cart-item {
      background: #fff !important;
      color: #1e293b !important;
      box-shadow: 0 2px 8px #e0e7ef !important;
    }
    body.light-theme .cart-item * {
      color: #1e293b !important;
    }
    body.light-theme .cart-item-price {
      color: #3b82f6 !important;
    }
    body.light-theme .cart-item-qty button {
      background: #3b82f6 !important;
      color: #fff !important;
    }
    body.light-theme .cart-item-qty button:hover {
      background: #2563eb !important;
    }
    body.light-theme .empty-cart-btn,
    body.light-theme .cart-btn.empty-cart-btn {
      color: #fff !important;
    }
  </style>
</head>
<body>

  <div class="cart-container">
    <div class="cart-title">Your Cart</div>
    <div class="cart-items-list" id="cart-items-list"></div>
    <div class="cart-total" id="cart-total"></div>
    <div class="cart-actions">
      <button id="empty-cart-btn" class="buy-btn">Empty Cart</button>
      <button id="checkout-btn" class="buy-btn">Checkout Now</button>
    </div>
  </div>
  <script>
function getCart() {
  return JSON.parse(localStorage.getItem('cart') || '[]');
}

function renderCart(cartData) {
  const cart = cartData || getCart();
  const cartList = document.getElementById('cart-items-list');
  const cartTotal = document.getElementById('cart-total');
  cartList.innerHTML = '';
  let total = 0;
  if (cart.length === 0) {
    cartList.innerHTML = '<div class="empty-cart">Your cart is empty.</div>';
    cartTotal.textContent = '';
    document.getElementById('empty-cart-btn').disabled = true;
    return;
  }
  cart.forEach((item, idx) => {
    total += item.price * item.qty;
    const div = document.createElement('div');
    div.className = 'cart-item';
    
    // Use displayTitle if available, otherwise fall back to title
    const displayTitle = item.displayTitle || item.title;
    
    div.innerHTML = `
      <img class="cart-item-img" src="${item.img}" alt="${displayTitle}">
      <div class="cart-item-details">
        <div class="cart-item-title">${displayTitle}</div>
        <div class="cart-item-price">₹${item.price} x ${item.qty}</div>
        <div class="cart-item-qty">
          <button onclick="updateQty(${idx}, -1)">-</button>
          <input type="number" min="1" value="${item.qty}" onchange="setQty(${idx}, this.value)">
          <button onclick="updateQty(${idx}, 1)">+</button>
          <button class="cart-item-remove" onclick="removeItem(${idx})" title="Remove">×</button>
        </div>
      </div>
    `;
    cartList.appendChild(div);
  });
  cartTotal.textContent = 'Total: ₹' + total;
  document.getElementById('empty-cart-btn').disabled = false;
}

function updateQty(idx, change) {
  const cart = getCart();
  cart[idx].qty = Math.max(1, cart[idx].qty + change);
  localStorage.setItem('cart', JSON.stringify(cart));
  renderCart();
}
function setQty(idx, value) {
  const cart = getCart();
  cart[idx].qty = Math.max(1, parseInt(value) || 1);
  localStorage.setItem('cart', JSON.stringify(cart));
  renderCart();
}
function removeItem(idx) {
  const cart = getCart();
  cart.splice(idx, 1);
  localStorage.setItem('cart', JSON.stringify(cart));
  renderCart();
}
document.getElementById('empty-cart-btn').onclick = function() {
  localStorage.setItem('cart', '[]');
  renderCart();
  // Notify parent window (product.html) to update its cart badge/count
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'cart-updated' }, '*');
  }
};

// Add checkout functionality
document.getElementById('checkout-btn').onclick = function() {
  const cart = getCart();
  
  if (cart.length === 0) {
    alert('Your cart is empty. Please add some items first.');
    return;
  }
  
  // Clear any existing tempCart (from Buy Now) to avoid confusion
  localStorage.removeItem('tempCart');
  
  // Store cart data for payment page with a specific key
  localStorage.setItem('checkoutCart', JSON.stringify(cart));
  
  // Open payment page in new tab
  window.open('payment.html', '_blank');
};

// Listen for cart update messages from parent
window.addEventListener('message', function(event) {
  if (event.data && event.data.type === 'cart-updated') {
    // Use the cart data sent from the parent, if available
    if (event.data.cart) {
      renderCart(event.data.cart);
    } else {
      renderCart();
    }
  }
});

// Render on load
renderCart();

document.addEventListener('DOMContentLoaded', function() {
  const themeToggle = document.getElementById('theme-toggle');
  const themeIcon = document.querySelector('.theme-icon');
  // Check for saved theme preference or default to dark
  const currentTheme = localStorage.getItem('theme') || 'dark';
  updateTheme(currentTheme);
  function updateThemeIcon(theme) {
    const icon = theme === 'light' ? '☀️' : '🌙';
    if (themeIcon) themeIcon.textContent = icon;
  }
  function updateTheme(theme) {
    const body = document.body;
    if (theme === 'light') {
      body.classList.add('light-theme');
    } else {
      body.classList.remove('light-theme');
    }
    updateThemeIcon(theme);
  }
  function toggleTheme() {
    const currentTheme = localStorage.getItem('theme') || 'dark';
    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
    localStorage.setItem('theme', newTheme);
    updateTheme(newTheme);
  }
  if (themeToggle) {
    themeToggle.addEventListener('click', toggleTheme);
  }
  if (!localStorage.getItem('theme')) {
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const defaultTheme = prefersDark ? 'dark' : 'light';
    localStorage.setItem('theme', defaultTheme);
    updateTheme(defaultTheme);
  }
});
</script>
</body>
</html>
