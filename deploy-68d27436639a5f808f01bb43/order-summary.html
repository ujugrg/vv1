<script>
document.addEventListener('DOMContentLoaded', function() {
  const themeToggle = document.getElementById('theme-toggle');
  const themeIcon = document.querySelector('.theme-icon');
  // Check for saved theme preference or default to dark
  const currentTheme = localStorage.getItem('theme') || 'dark';
  updateTheme(currentTheme);
  function updateThemeIcon(theme) {
    const icon = theme === 'light' ? '☀️' : '🌙';
    if (themeIcon) themeIcon.textContent = icon;
  }
  function updateTheme(theme) {
    const body = document.body;
    if (theme === 'light') {
      body.classList.add('light-theme');
    } else {
      body.classList.remove('light-theme');
    }
    updateThemeIcon(theme);
  }
  function toggleTheme() {
    const currentTheme = localStorage.getItem('theme') || 'dark';
    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
    localStorage.setItem('theme', newTheme);
    updateTheme(newTheme);
  }
  if (themeToggle) {
    themeToggle.addEventListener('click', toggleTheme);
  }
  if (!localStorage.getItem('theme')) {
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const defaultTheme = prefersDark ? 'dark' : 'light';
    localStorage.setItem('theme', defaultTheme);
    updateTheme(defaultTheme);
  }
  
  // Initialize UPI ID display
  const primaryUpiId = '9817025583@okbizaxis';
  const backupUpiId = '9817025583@okbizaxis';
  
  // Code for setting UPI ID in sessionStorage removed as we're now directly showing payment instructions
  
  // Add event listener for UPI button
  const singleUpiBtn = document.getElementById('single-upi-btn');
  if (singleUpiBtn) {
    singleUpiBtn.addEventListener('click', function() {
      openUpiApp();
    });
  }
  
  // Single UPI button event listener removed as we're now directly showing payment instructions

  // Copy UPI ID button event listener removed as we're now directly showing payment instructions
});
</script>

    console.log('tempCart (Buy Now):', tempCart);
    console.log('checkoutCart (Checkout):', checkoutCart);
    console.log('cart (Regular):', cart);
    console.log('orderSource:', orderSource);

    // Calculate total once

    // Function to copy UPI ID to clipboard
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('UPI ID copied to clipboard!');
      }).catch(() => {
        // Fallback for older browsers
        const textArea = document.createElement('textarea');
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        alert('UPI ID copied to clipboard!');
      });
    }

    // Update the Pay Now button click handler to directly show payment instructions
    payBtn.onclick = function() {
      // Call the openUpiApp function which now directly shows payment instructions
      openUpiApp();

    // Modal close handlers removed as we're now directly showing payment instructions
    
    // Clear cart data based on the source
    if (orderSource === 'buyNow' || tempCart.length > 0) {
      localStorage.removeItem('tempCart');
    } else if (orderSource === 'checkout' || checkoutCart.length > 0) {
      localStorage.removeItem('checkoutCart');
      // Also clear the main cart since checkout was completed
      localStorage.removeItem('cart');
    }
    
    // Clear the temporary storage
    localStorage.removeItem('currentOrderItems');
    localStorage.removeItem('orderSource');
    
  </script>
