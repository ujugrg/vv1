<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment</title>
  <!-- Add viewport meta tag for mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #23262f; /* aur dark */
      color: #e0e0e0;      /* text ko halka sa light */
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .main-wrapper {
      display: flex;
      gap: 56px;
      padding: 40px 40px;
      width: 100vw;
      min-height: 100vh;
      justify-content: center;
      align-items: flex-start;
      background:#131313;
    }
    .card {
      background: #181818; /* dark card */
      color: #e0e0e0;
      border-radius: 18px;
      box-shadow: 0 4px 24px 0 rgba(0,0,0,0.25);
      padding: 32px 60px 28px 28px;
      min-width: 350px;
      max-width: 420px;
      flex: 1 1 350px;
      margin: 0 0 16px 0;
    }
    .card h2 {
      text-align: center;
      margin-bottom: 28px;
      color: #fafafa;
      font-size: 2rem;
      letter-spacing: 1px;
      font-weight: 700;
    }
    .payment-form .form-row {
      display: flex;
      gap: 16px;
    }
    .payment-form .form-group {
      margin-bottom: 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .payment-form label {
      margin-bottom: 6px;
      color: #bdbdbd;
      font-weight: 500;
      font-size: 1rem;
    }
    .payment-form input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #181818;
      color: #fafafa;
      font-size: 1rem;
      transition: border 0.2s, box-shadow 0.2s;
      margin-bottom: 2px;
    }
    /* Reduce width for First Name and Town / City fields */
    #firstName, #city {
      max-width: 185px;
    }
    .payment-form input:focus {
      border-color: #805ad5;
      outline: none;
      background: #232323;
      color: #fff;
      box-shadow: 0 0 0 2px #805ad533;
    }
    .pay-btn {
      width: 100%;
      padding: 14px;
      background: #313132;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-top: 10px;
      box-shadow: 0 2px 8px #805ad522;
    }
    .pay-btn:hover {
      background: #313132;
      transform: scale(1.03);
    }
    .order-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #222222;
      color: #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      font-size: 1rem;
    }
    .order-table th, .order-table td {
      padding: 12px 10px;
      border-bottom: 1px solid #222222;
      text-align: left;
    }
    .order-table th {
      background: #222222;
      color: #bdbdbd;
      font-weight: 600;
    }
    .order-table tr:last-child td {
      border-bottom: none;
    }
    .order-summary {
      margin-top: 18px;
      font-size: 1.1rem;
      color: #fafafa;
    }
    .order-summary .label {
      font-weight: 500;
      color: #bdbdbd;
    }
    .order-summary .value {
      font-weight: 700;
      float: right;
    }
    .success-message {
      color: #38a169;
      text-align: center;
      margin-top: 16px;
      font-weight: 600;
      font-size: 1.1rem;
    }
    .back-btn {
      display: block;
      width: 100%;
      margin-bottom: 14px;
      padding: 10px 0;
      background: #313132;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 1px 4px #805ad522;
    }
    .back-btn:hover {
      background: #313132;
      transform: scale(1.02);
    }
    .card, .payment-form input {
      box-sizing: border-box;
    }
    @media (max-width: 900px) {
      .main-wrapper {
        flex-direction: column;
        align-items: center;
        gap: 0;
        padding: 20px 0;
      }
      .card {
        max-width: 98vw;
        min-width: 0;
        width: 98vw;
      }
    }
    @media (max-width: 600px) {
      body {
        padding: 0 4vw;
      }
      .main-wrapper {
        padding: 0;
      }
      .card {
        width: 100%;
        max-width: 100vw;
        min-width: 0;
        padding: 12px 2vw 12px 2vw;
        box-sizing: border-box;
      }
      .payment-form input {
        width: 100%;
        box-sizing: border-box;
      }
      .order-table {
        display: block;
        width: 100%;
        overflow-x: auto;
      }
      .order-table table {
        min-width: 340px;
      }
    }
    @media (max-width: 400px) {
      .card {
        padding: 8px 2vw 8px 2vw;
      }
      .pay-btn {
        font-size: 0.95rem;
        padding: 10px;
      }
    }
    /* Telegram Floating Button Style */
    .telegram-float {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 9999;
      background: #229ED9;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      padding: 10px;
      transition: transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: telegram-bounce 2s infinite;
    }
    .whatsapp-float {
  position: fixed;
  bottom: 100px; /* Adjust so it sits above Telegram */
  right: 30px;
  z-index: 1000;
  background: #25d366;
  border-radius: 50%;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  padding: 8px;
  cursor: pointer;
  transition: box-shadow 0.2s;
}
.whatsapp-float:hover {
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
  </style>
</head>
<body>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const themeToggle = document.getElementById('theme-toggle');
  const themeIcon = document.querySelector('.theme-icon');
  // Check for saved theme preference or default to dark
  const currentTheme = localStorage.getItem('theme') || 'dark';
  updateTheme(currentTheme);
  function updateThemeIcon(theme) {
    const icon = theme === 'light' ? '☀️' : '🌙';
    if (themeIcon) themeIcon.textContent = icon;
  }
  function updateTheme(theme) {
    const body = document.body;
    if (theme === 'light') {
      body.classList.add('light-theme');
    } else {
      body.classList.remove('light-theme');
    }
    updateThemeIcon(theme);
  }
  function toggleTheme() {
    const currentTheme = localStorage.getItem('theme') || 'dark';
    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
    localStorage.setItem('theme', newTheme);
    updateTheme(newTheme);
  }
  if (themeToggle) {
    themeToggle.addEventListener('click', toggleTheme);
  }
  if (!localStorage.getItem('theme')) {
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const defaultTheme = prefersDark ? 'dark' : 'light';
    localStorage.setItem('theme', defaultTheme);
    updateTheme(defaultTheme);
  }
});
</script>

  <script>
    // Read cart from localStorage - Check for tempCart first (Buy Now), then checkoutCart (Checkout)
    const tempCart = JSON.parse(localStorage.getItem('tempCart')) || [];
    const checkoutCart = JSON.parse(localStorage.getItem('checkoutCart')) || [];
    const cart = JSON.parse(localStorage.getItem('cart')) || [];

    // Use tempCart if available (Buy Now), then checkoutCart (Checkout), otherwise use regular cart
    let orderItems = [];
    let orderSource = '';

    if (tempCart.length > 0) {
      orderItems = tempCart;
      orderSource = 'buyNow';
    } else if (checkoutCart.length > 0) {
      orderItems = checkoutCart;
      orderSource = 'checkout';
    } else {
      orderItems = cart;
      orderSource = 'cart';
    }

    // Debug logging
    console.log('tempCart (Buy Now):', tempCart);
    console.log('checkoutCart (Checkout):', checkoutCart);
    console.log('cart (Regular):', cart);
    console.log('orderItems:', orderItems);
    console.log('orderSource:', orderSource);

    function renderCart() {
      const cartDiv = document.getElementById('cart-details');
      if (orderItems.length === 0) {
        cartDiv.innerHTML = "<p>Your cart is empty.</p>";
        return;
      }
      let total = 0;
      let html = `<table class="order-table">
        <tr>
          <th>Product</th>
          <th style="text-align:right">Subtotal</th>
        </tr>`;
      orderItems.forEach(item => {
        const displayTitle = item.displayTitle || item.title;
        html += `<tr>
          <td>${displayTitle} <span style='color:#888;font-size:0.95em;'>× ${item.qty}</span></td>
          <td style="text-align:right">₹${(item.price * item.qty).toFixed(2)}</td>
        </tr>`;
        total += item.price * item.qty;
      });
      html += `<tr><td colspan="2"><hr style="border:none;border-top:1px solid #e2e8f0;"></td></tr>`;
      html += `<tr>
        <td class="label">Subtotal</td>
        <td class="value" style="text-align:right">₹${total.toFixed(2)}</td>
      </tr>`;
      html += `<tr>
        <td class="label">Total</td>
        <td class="value" style="text-align:right">₹${total.toFixed(2)}</td>
      </tr>`;
      html += `</table>`;
      cartDiv.innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', renderCart);

    function validateForm() {
      const firstName = document.getElementById('firstName').value.trim();
      const email = document.getElementById('email').value.trim();
      const mobile = document.getElementById('mobile').value.trim();
      
      // Check required fields
      if (!firstName) {
        alert('Please enter your first name');
        document.getElementById('firstName').focus();
        return false;
      }
      
      if (!email) {
        alert('Please enter your email address');
        document.getElementById('email').focus();
        return false;
      }
      
      if (!mobile) {
        alert('Please enter your mobile number');
        document.getElementById('mobile').focus();
        return false;
      }
      
      // Email validation
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        alert('Please enter a valid email address');
        document.getElementById('email').focus();
        return false;
      }
      
      // Mobile validation (10 digits)
      const mobileRegex = /^[0-9]{10}$/;
      if (!mobileRegex.test(mobile)) {
        alert('Please enter a valid 10-digit mobile number');
        document.getElementById('mobile').focus();
        return false;
      }
      
      return true;
    }

    // Google Apps Script Web App URL yahan paste karein
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbxIjHbw_oWwua0KMpg0NrGV5_kvCUdbhVtX63nmmMAEEX4wZNP_hQ8iXUzdpW1H3MSkxA/exec";

    document.getElementById('paymentForm').addEventListener('submit', function(e) {
      e.preventDefault();

      // Get form values
      const customer = {
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        email: document.getElementById('email').value,
        mobile: document.getElementById('mobile').value,
        city: document.getElementById('city').value,
        state: document.getElementById('state').value,
        zip: document.getElementById('zip').value
      };

      // Save to localStorage
      localStorage.setItem('customer', JSON.stringify(customer));

      // Also save the current orderItems to localStorage for order-summary
      localStorage.setItem('currentOrderItems', JSON.stringify(orderItems));
      localStorage.setItem('orderSource', orderSource);

      // Send to Google Sheet
      fetch(SHEET_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          customer: customer,
          cart: orderItems
        })
      });

      document.getElementById('successMsg').style.display = 'block';
      setTimeout(() => {
        document.getElementById('successMsg').style.display = 'none';
        document.getElementById('paymentForm').reset();
        
        // Clear cart data based on the source
        if (orderSource === 'buyNow') {
          localStorage.removeItem('tempCart');
        } else if (orderSource === 'checkout') {
          localStorage.removeItem('checkoutCart');
          // Also clear the main cart since checkout was completed
          localStorage.removeItem('cart');
        }
        
        // Redirect to order summary
        window.location.replace('order-summary.html');
      }, 2000);
    });
  </script>
